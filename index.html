async function waitFirebase() {
  if (window._fbReady) return;
  await new Promise(r => window.addEventListener("firebase-ready", r, { once: true }));
}
async function dbGet(key) {
  await waitFirebase();
  return window._fbGet(key);
}
async function dbSet(key, value) {
  await waitFirebase();
  return window._fbSet(key, value);
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState(0);
  const [drinks, setDrinks] = useState([]);
  const [bar, setBar] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);
  const [modal, setModal] = useState(null);
  const [classicsModal, setClassicsModal] = useState(false);
  const [search, setSearch] = useState("");
  const [filterCat, setFilterCat] = useState("Todos");
  const [filterFav, setFilterFav] = useState("Todos");
  const [filterIngs, setFilterIngs] = useState([]);
  const [showIngFilter, setShowIngFilter] = useState(false);

  useEffect(() => {
    (async () => {
      const d = await dbGet("drinks");
      const b = await dbGet("bar");
      setDrinks(d ? JSON.parse(d) : []);
      setBar(b ? JSON.parse(b) : DEFAULT_BAR);
      setLoaded(true);
    })();
  }, []);

  const persistDrinks = useCallback(async (ds) => {
    setSaving(true);
    await dbSet("drinks", JSON.stringify(ds));
    setSaving(false);
  }, []);
  const persistBar = useCallback(async (b) => {
    await dbSet("bar", JSON.stringify(b));
  }, []);

  const updateDrinks = (ds) => { setDrinks(ds); persistDrinks(ds); };
  const updateBar = (b) => { setBar(b); persistBar(b); };

  const saveDrink = (drink) => {
    let ds;
    if (drink.id && drinks.find(d => d.id === drink.id)) ds = drinks.map(d => d.id === drink.id ? drink : d);
    else ds = [...drinks, { ...drink, id: Date.now() }];
    updateDrinks(ds);
    setModal(null);
  };
  const importClassic = (classic) => {
    if (!drinks.find(d => d.name === classic.name)) {
      const ds = [...drinks, { ...classic, id: Date.now()+Math.random(), favFelipe:false, favJoana:false, photo:"" }];
      updateDrinks(ds);
    }
  };
  const deleteDrink = (id) => { updateDrinks(drinks.filter(d => d.id !== id)); setModal(null); };
  const toggleFav = (id, who) => { updateDrinks(drinks.map(d => d.id===id ? {...d,[who]:!d[who]} : d)); };

  const filtered = useMemo(() => drinks.filter(d => {
    const q = search.toLowerCase();
    return (!q || d.name.toLowerCase().includes(q) || d.ingredients.some(i => i.toLowerCase().includes(q)))
      && (filterCat==="Todos" || d.category===filterCat)
      && (filterFav==="Todos" || (filterFav==="Felipe"&&d.favFelipe) || (filterFav==="Joana"&&d.favJoana))
      && (filterIngs.length===0 || filterIngs.every(fi => d.ingredients.includes(fi)));
  }), [drinks, search, filterCat, filterFav, filterIngs]);

  const makeable = useMemo(() => drinks.filter(d => d.ingredients.every(i => bar.includes(i))), [drinks, bar]);

  const tabs = [{label:"Drinks",icon:IC.magic},{label:"Meu Bar",icon:IC.bottle},{label:"Fazer Agora",icon:IC.check},{label:"Roleta",icon:IC.dice}];

  if (!loaded) return <div className="loading"><div className="spinner"></div><div className="loading-text">Carregando...</div></div>;

  return (
    <div style={S.root}>
      <header style={S.header}>
        <div style={S.headerInner}>
          <div style={S.logo}>
            <span style={S.logoMark}>⟡</span>
            <div>
              <div style={S.logoTitle}>SHAKER</div>
              <div style={S.logoSub}>Cocktail Collection — Felipe Cerqueira</div>
            </div>
          </div>
          <nav style={S.nav}>
            {tabs.map((t,i) => (
              <button key={i} style={{...S.navBtn,...(tab===i?S.navBtnActive:{})}} onClick={()=>setTab(i)}>
                <Ico d={t.icon} size={15} stroke={tab===i?"#C4922A":"#A08060"} sw="2"/>
                <span className="nav-label">{t.label}</span>
              </button>
            ))}
          </nav>
        </div>
      </header>

      {saving && <div style={{background:"#C4922A",color:"#fff",fontSize:11,letterSpacing:1,textAlign:"center",padding:"4px",textTransform:"uppercase"}}>Salvando…</div>}

      <main style={S.main}>
        {tab===0 && (
          <div>
            <div style={S.toolbar}>
              <div style={S.searchWrap}>
                <Ico d={IC.search} size={16} stroke="#9A7A5A"/>
                <input style={S.searchInput} placeholder="Buscar drink ou ingrediente…" value={search} onChange={e=>setSearch(e.target.value)}/>
                {search && <button style={S.clearBtn} onClick={()=>setSearch("")}><Ico d={IC.x} size={14} stroke="#9A7A5A"/></button>}
              </div>
              <button style={{...S.addBtn,background:"#FFF0D0",color:"#8A5C18",border:"1.5px solid #C4922A"}} onClick={()=>setClassicsModal(true)}>
                <Ico d={IC.book} size={15} stroke="#C4922A" sw="2"/>
                <span style={{whiteSpace:"nowrap"}}>Clássicos</span>
              </button>
              <button style={S.addBtn} onClick={()=>setModal({mode:"edit",drink:null})}>
                <Ico d={IC.plus} size={16} stroke="#fff" sw="2.5"/>
                <span>Novo</span>
              </button>
            </div>

            <div style={S.chipRow}>
              {["Todos",...CATEGORIES].map(c=>(
                <button key={c} style={{...S.chip,...(filterCat===c?S.chipActive:{})}} onClick={()=>setFilterCat(c)}>{c}</button>
              ))}
            </div>
            <div style={S.chipRow}>
              {[["Todos","Todos"],["⭐ Felipe","Felipe"],["💛 Joana","Joana"]].map(([lbl,val])=>(
                <button key={val} style={{...S.chip,...(filterFav===val?S.chipActive:{})}} onClick={()=>setFilterFav(val)}>{lbl}</button>
              ))}
              <button style={{...S.chip,...(filterIngs.length>0?S.chipActive:{}),gap:5}} onClick={()=>setShowIngFilter(v=>!v)}>
                <Ico d={IC.filter} size={12} stroke={filterIngs.length>0?"#fff":"#9A7A5A"} sw="2"/>
                {filterIngs.length>0?`${filterIngs.length} ingrediente(s)`:"Filtrar por ingrediente"}
              </button>
              {filterIngs.length>0 && <button style={{...S.chip,background:"#FDEAEA",color:"#C03030",border:"1.5px solid #E88080"}} onClick={()=>setFilterIngs([])}>Limpar</button>}
            </div>

            {showIngFilter && (
              <div style={S.ingFilterPanel}>
                <div style={{fontSize:11,color:"#9A7A5A",marginBottom:10,letterSpacing:1,textTransform:"uppercase"}}>Selecione ingredientes para filtrar</div>
                <div style={S.ingGrid}>
                  {INGREDIENT_LIST.map(ing=>{
                    const active=filterIngs.includes(ing);
                    return <button key={ing} style={{...S.ingTag,...(active?S.ingTagActive:{})}} onClick={()=>setFilterIngs(p=>active?p.filter(i=>i!==ing):[...p,ing])}>
                      {active&&<Ico d={IC.check} size={11} stroke="#fff" sw="3"/>}{ing}
                    </button>;
                  })}
                </div>
              </div>
            )}

            {drinks.length===0 ? (
              <div style={S.empty}>
                <div style={{fontSize:48,marginBottom:16}}>🍸</div>
                <div style={{color:"#7A5C3A",marginBottom:6}}>Seu catálogo está vazio</div>
                <div style={{color:"#9A7A5A",fontSize:13,marginBottom:20}}>Importe drinks clássicos ou crie o seu primeiro</div>
                <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
                  <button style={{...S.addBtn,background:"#FFF0D0",color:"#8A5C18",border:"1.5px solid #C4922A"}} onClick={()=>setClassicsModal(true)}>
                    <Ico d={IC.book} size={15} stroke="#C4922A"/> Biblioteca de Clássicos
                  </button>
                  <button style={S.addBtn} onClick={()=>setModal({mode:"edit",drink:null})}>
                    <Ico d={IC.plus} size={16} stroke="#fff"/> Criar Drink
                  </button>
                </div>
              </div>
            ) : filtered.length===0 ? (
              <div style={S.empty}><div style={{fontSize:36,marginBottom:12}}>🔍</div><div style={{color:"#9A7A5A"}}>Nenhum drink encontrado</div></div>
            ) : (
              <div style={S.grid}>
                {filtered.map(d=>(
                  <DrinkCard key={d.id} drink={d} barHas={d.ingredients.every(i=>bar.includes(i))}
                    onView={()=>setModal({mode:"view",drink:d})} onToggleFav={toggleFav}/>
                ))}
              </div>
            )}
          </div>
        )}

        {tab===1 && <BarTab bar={bar} setBar={updateBar}/>}

        {tab===2 && (
          <div>
            <div style={{...S.sectionHeader,justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <Ico d={IC.magic} size={18} stroke="#C4922A"/>
                <span style={{color:"#8A5C18",fontSize:13,letterSpacing:1.5,textTransform:"uppercase"}}>
                  {makeable.length} drink{makeable.length!==1?"s":""} possíveis com o seu bar
                </span>
              </div>
              <CopyBtn text={makeable.map(d=>d.name).join(", ")} label="📋 Copiar Drinks" disabled={makeable.length===0}/>
            </div>
            {makeable.length===0 ? (
              <div style={S.empty}>
                <div style={{fontSize:40,marginBottom:12}}>🥃</div>
                <div style={{color:"#9A7A5A"}}>Nenhum drink possível com o bar atual</div>
                <div style={{color:"#9A7A5A",fontSize:13,marginTop:6}}>Adicione ingredientes na aba Meu Bar</div>
              </div>
            ) : (
              <div style={S.grid}>
                {makeable.map(d=>(
                  <DrinkCard key={d.id} drink={d} barHas={true} highlight
                    onView={()=>setModal({mode:"view",drink:d})} onToggleFav={toggleFav}/>
                ))}
              </div>
            )}
          </div>
        )}

        {tab===3 && <RouletteTab makeable={makeable} onViewDrink={d=>setModal({mode:"view",drink:d})}/>}
      </main>

      {modal && <Modal mode={modal.mode} drink={modal.drink} bar={bar} onClose={()=>setModal(null)}
        onSave={saveDrink} onDelete={deleteDrink} onEdit={d=>setModal({mode:"edit",drink:d})} onToggleFav={toggleFav}/>}
      {classicsModal && <ClassicsModal drinks={drinks} onImport={importClassic} onClose={()=>setClassicsModal(false)} bar={bar}/>}
    </div>
  );
}


// ─── CopyBtn ──────────────────────────────────────────────────────────────────
function CopyBtn({text, label, disabled}) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    if (!text || disabled) return;
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };
  return (
    <button onClick={copy} disabled={disabled} style={{
      display:"inline-flex",alignItems:"center",gap:6,
      padding:"6px 14px",borderRadius:20,border:"1.5px solid",
      background: copied ? "#E8F5EC" : "#FFF8EE",
      borderColor: copied ? "#5AAA70" : "#C4922A",
      color: copied ? "#1A6B30" : "#8A5C18",
      cursor: disabled ? "default" : "pointer",
      fontSize:12,fontFamily:"'Georgia',serif",fontWeight:600,
      opacity: disabled ? .4 : 1,
      whiteSpace:"nowrap",
      transition:"all .2s",
    }}>
      {copied ? "✓ Copiado!" : label}
    </button>
  );
}

// ─── RouletteTab ─────────────────────────────────────────────────────────────
function RouletteTab({makeable, onViewDrink}) {
  const [spinning, setSpinning] = useState(false);
  const [rouletteDrink, setRouletteDrink] = useState(null);
  const [spinAngle, setSpinAngle] = useState(0);

  const spinRoulette = () => {
    if (spinning || makeable.length === 0) return;
    setSpinning(true);
    setRouletteDrink(null);
    const picked = makeable[Math.floor(Math.random() * makeable.length)];
    const newAngle = spinAngle + 1440 + Math.floor(Math.random() * 360);
    setSpinAngle(newAngle);
    setTimeout(() => { setRouletteDrink(picked); setSpinning(false); }, 1800);
  };

  return (
    <div style={{background:"#fff",border:"1.5px solid #E8DCC8",borderRadius:16,padding:28,textAlign:"center",boxShadow:"0 2px 8px rgba(44,26,8,.06)"}}>
      <div style={{fontSize:11,letterSpacing:2,color:"#9A7A5A",textTransform:"uppercase",marginBottom:20}}>Roleta de Drinks</div>
      <div style={{position:"relative",width:160,height:160,margin:"0 auto 24px"}} onClick={spinRoulette}>
        <div style={{
          width:160, height:160, borderRadius:"50%",
          background: spinning ? "conic-gradient(#C4922A,#E8DCC8,#C4922A,#F5F0E8,#C4922A,#D4B896,#C4922A)" : (rouletteDrink ? rouletteDrink.color||"#C4922A" : "#F5F0E8"),
          border:"3px solid #C4922A",
          transform:`rotate(${spinAngle}deg)`,
          transition: spinning ? "transform 1.8s cubic-bezier(.17,.67,.12,1)" : "none",
          cursor: makeable.length>0 ? "pointer" : "default",
          display:"flex", alignItems:"center", justifyContent:"center",
          boxShadow:"0 4px 20px rgba(196,146,42,.2)",
        }}>
          {!spinning && !rouletteDrink && <span style={{fontSize:40}}>🎰</span>}
          {spinning && <span style={{fontSize:32,opacity:.6}}>🌀</span>}
        </div>
        <div style={{position:"absolute",top:-10,left:"50%",transform:"translateX(-50%)",fontSize:20,filter:"drop-shadow(0 2px 2px rgba(0,0,0,.2))"}}>▼</div>
      </div>

      {makeable.length === 0 ? (
        <div style={{color:"#9A7A5A",fontSize:13}}>Adicione ingredientes no Meu Bar para usar a roleta</div>
      ) : !spinning && !rouletteDrink ? (
        <div>
          <div style={{color:"#9A7A5A",fontSize:13,marginBottom:16}}>Gira entre {makeable.length} drink{makeable.length!==1?"s":""} possíveis</div>
          <button style={Sb.btn} onClick={spinRoulette}>🎰 Girar Roleta</button>
        </div>
      ) : spinning ? (
        <div style={{color:"#C4922A",fontSize:14,fontWeight:600,letterSpacing:1}}>Girando…</div>
      ) : rouletteDrink ? (
        <div>
          <div style={{fontSize:11,color:"#9A7A5A",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>Seu drink é</div>
          <div style={{fontSize:22,fontWeight:700,color:"#2C1A08",marginBottom:4}}>{rouletteDrink.name}</div>
          <div style={{fontSize:12,color:"#9A7A5A",marginBottom:16}}>{rouletteDrink.category} · {TECHNIQUES.find(t=>t.value===rouletteDrink.technique)?.emoji} {TECHNIQUES.find(t=>t.value===rouletteDrink.technique)?.label}</div>
          <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
            <button style={Sb.btn} onClick={()=>onViewDrink(rouletteDrink)}>Ver Receita</button>
            <button style={{...Sb.btn,background:"#FFF8EE",color:"#8A5C18",border:"1.5px solid #C4922A"}} onClick={spinRoulette}>🎰 Girar de Novo</button>
          </div>
        </div>
      ) : null}
    </div>
  );
}
const Sb = {
  btn: {display:"inline-flex",alignItems:"center",gap:8,padding:"10px 20px",background:"#C4922A",color:"#fff",border:"none",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"'Georgia',serif"},
};

// ─── DrinkCard ────────────────────────────────────────────────────────────────
function DrinkCard({drink,barHas,onView,onToggleFav,highlight}) {
  const tech = TECHNIQUES.find(t=>t.value===drink.technique);
  return (
    <div className="drink-card" style={{...S.card,borderColor:highlight?"#C4922A60":"#E8DCC8"}} onClick={onView}>
      <div style={{...S.cardBand,background:drink.photo?`url(${drink.photo}) center/cover`:drink.color||"#8C6B4A"}}>
        <div style={S.cardBandOverlay}/>
        {barHas && <div style={S.makeableBadge}>✓ Possível</div>}
        {tech && <div style={S.techBadge}>{tech.emoji} {tech.label}</div>}
        <div style={S.cardName}>{drink.name}</div>
        <div style={S.cardCat}>{drink.category}</div>
      </div>
      <div style={S.cardBody}>
        <div style={{flex:1,minWidth:0}}>
          <div style={S.cardIngs}>{drink.ingredients.slice(0,3).join(" · ")}{drink.ingredients.length>3&&<span style={{color:"#B89A7A"}}> +{drink.ingredients.length-3}</span>}</div>
          {drink.glass && <div style={S.cardGlass}>🥃 {drink.glass.split("(")[0].trim()}</div>}
        </div>
        <div style={S.cardFavs}>
          <button style={{...S.favBtn,opacity:drink.favFelipe?1:.25}} onClick={e=>{e.stopPropagation();onToggleFav(drink.id,"favFelipe");}}>⭐</button>
          <button style={{...S.favBtn,opacity:drink.favJoana?1:.25}} onClick={e=>{e.stopPropagation();onToggleFav(drink.id,"favJoana");}}>💛</button>
        </div>
      </div>
    </div>
  );
}

// ─── ClassicsModal ────────────────────────────────────────────────────────────
function ClassicsModal({drinks,onImport,onClose,bar}) {
  const [search,setSearch]=useState("");
  const [filterTech,setFilterTech]=useState("Todos");
  const imported=drinks.map(d=>d.name);
  const filtered=CLASSICS_LIBRARY.filter(d=>{
    const q=search.toLowerCase();
    return (!q||d.name.toLowerCase().includes(q)||d.ingredients.some(i=>i.toLowerCase().includes(q)))
      &&(filterTech==="Todos"||d.technique===filterTech);
  });
  return (
    <div style={S.overlay} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{...S.modalBox,maxWidth:680}} className="modal-scroll">
        <div style={{padding:"20px 24px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:16,color:"#1C1208",fontWeight:700}}>Biblioteca de Clássicos</div>
            <div style={{fontSize:12,color:"#9A7A5A",marginTop:2}}>{CLASSICS_LIBRARY.length} drinks · clique para importar</div>
          </div>
          <button style={S.modalClose} onClick={onClose}><Ico d={IC.x} size={18} stroke="#9A7A5A" sw="2"/></button>
        </div>
        <div style={{padding:"14px 24px 0"}}>
          <div style={{...S.searchWrap,marginBottom:12}}>
            <Ico d={IC.search} size={16} stroke="#9A7A5A"/>
            <input style={S.searchInput} placeholder="Buscar…" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <div style={{...S.chipRow,marginBottom:16}}>
            {["Todos",...TECHNIQUES.map(t=>t.value)].map(v=>{
              const t=TECHNIQUES.find(x=>x.value===v);
              return <button key={v} style={{...S.chip,...(filterTech===v?S.chipActive:{})}} onClick={()=>setFilterTech(v)}>{t?`${t.emoji} ${t.label}`:"Todos"}</button>;
            })}
          </div>
        </div>
        <div style={{padding:"0 24px 24px",display:"flex",flexDirection:"column",gap:8}}>
          {filtered.map(d=>{
            const alreadyIn=imported.includes(d.name);
            const canMake=d.ingredients.every(i=>bar.includes(i));
            const tech=TECHNIQUES.find(t=>t.value===d.technique);
            return (
              <div key={d.name} style={{...S.classicRow,borderColor:canMake?"#5AAA7080":"#D4B896"}}>
                <div style={{width:6,height:"100%",background:d.color,borderRadius:"4px 0 0 4px",position:"absolute",left:0,top:0,bottom:0}}/>
                <div style={{flex:1,paddingLeft:8,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                    <span style={{color:"#1C1208",fontSize:14,fontWeight:600}}>{d.name}</span>
                    {canMake&&<span style={{fontSize:10,color:"#1A6B30",background:"#D4F4DF",padding:"1px 6px",borderRadius:10}}>✓ possível</span>}
                  </div>
                  <div style={{fontSize:11,color:"#9A7A5A"}}>{tech&&`${tech.emoji} ${tech.label}`} · 🥃 {d.glass.split("(")[0].trim()} · 🌿 {d.garnish}</div>
                  <div style={{fontSize:11,color:"#7A5C3A",marginTop:2}}>{d.ingredients.join(" · ")}</div>
                </div>
                <button style={{...S.importBtn,...(alreadyIn?{background:"#E8DCC8",color:"#B89A7A",cursor:"default"}:{})}}
                  onClick={()=>!alreadyIn&&onImport(d)} disabled={alreadyIn}>
                  {alreadyIn?"✓ importado":"+ importar"}
                </button>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── BarTab ───────────────────────────────────────────────────────────────────
function BarTab({bar,setBar}) {
  const [ingSearch,setIngSearch]=useState("");
  const [custom,setCustom]=useState("");
  const filteredList=useMemo(()=>INGREDIENT_LIST.filter(i=>i.toLowerCase().includes(ingSearch.toLowerCase())&&!bar.includes(i)),[ingSearch,bar]);
  const addCustom=()=>{const v=custom.trim();if(v&&!bar.includes(v)){setBar([...bar,v].sort());setCustom("");}};
  return (
    <div>
      <div style={{...S.sectionHeader,justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <Ico d={IC.bottle} size={18} stroke="#C4922A"/>
          <span style={{color:"#8A5C18",fontSize:13,letterSpacing:1.5,textTransform:"uppercase"}}>{bar.length} ingrediente{bar.length!==1?"s":""} no bar</span>
        </div>
        <CopyBtn text={[...bar].sort().join(", ")} label="📋 Copiar Lista"/>
      </div>
      <div style={{...S.ingGrid,marginBottom:24}}>
        {[...bar].sort().map(ing=>(
          <div key={ing} style={S.barTag}>
            <span>{ing}</span>
            <button style={S.barTagRemove} onClick={()=>setBar(bar.filter(i=>i!==ing))}><Ico d={IC.x} size={12} stroke="#C03030" sw="2.5"/></button>
          </div>
        ))}
      </div>
      <div style={S.divider}/>
      <div style={{fontSize:11,color:"#9A7A5A",letterSpacing:1,textTransform:"uppercase",margin:"20px 0 12px"}}>Adicionar ao Bar</div>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <input style={{...S.input,flex:1,marginBottom:0}} placeholder="Ingrediente personalizado…" value={custom} onChange={e=>setCustom(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCustom()}/>
        <button style={S.addBtn} onClick={addCustom}><Ico d={IC.plus} size={16} stroke="#fff" sw="2.5"/>Adicionar</button>
      </div>
      <div style={S.searchWrap}>
        <Ico d={IC.search} size={16} stroke="#9A7A5A"/>
        <input style={S.searchInput} placeholder="Buscar ingrediente…" value={ingSearch} onChange={e=>setIngSearch(e.target.value)}/>
      </div>
      <div style={{...S.ingGrid,marginTop:12}}>
        {filteredList.map(ing=>(
          <button key={ing} style={S.ingTag} onClick={()=>setBar([...bar,ing].sort())}>
            <Ico d={IC.plus} size={11} stroke="#9A7A5A" sw="2"/>{ing}
          </button>
        ))}
      </div>
    </div>
  );
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function Modal({mode,drink,bar,onClose,onSave,onDelete,onEdit,onToggleFav}) {
  const blank={name:"",category:CATEGORIES[0],favFelipe:false,favJoana:false,photo:"",color:COLOR_SWATCHES[0],technique:"shaken",glass:GLASSES[0],garnish:"",ingredients:[""],amounts:[""],instructions:""};
  const [form,setForm]=useState(drink?{...drink}:blank);
  const [confirmDel,setConfirmDel]=useState(false);
  const [garnishInput,setGarnishInput]=useState(form.garnish||"");
  const [garnishOpen,setGarnishOpen]=useState(false);
  const isView=mode==="view", isEdit=mode==="edit";
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));
  const addIngRow=()=>setF("ingredients",[...form.ingredients,""]);
  const setIng=(i,v)=>{const a=[...form.ingredients];a[i]=v;setF("ingredients",a);};
  const setAmt=(i,v)=>{const a=[...form.amounts];a[i]=v;setF("amounts",a);};
  const removeIng=(i)=>{setF("ingredients",form.ingredients.filter((_,j)=>j!==i));setF("amounts",form.amounts.filter((_,j)=>j!==i));};
  const missing=isView&&drink?drink.ingredients.filter(i=>!bar.includes(i)):[];
  const tech=TECHNIQUES.find(t=>t.value===(isView?drink?.technique:form.technique));
  return (
    <div style={S.overlay} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={S.modalBox} className="modal-scroll">
        <div style={S.modalHeader}>
          {isView&&(
            <div style={{...S.bandFull,background:form.photo?`url(${form.photo}) center/cover`:form.color}}>
              <div style={S.bandFullOverlay}/>
              <div style={S.modalDrinkName}>{form.name}</div>
              <div style={S.modalDrinkCat}>{form.category}</div>
            </div>
          )}
          {isEdit&&<div style={{padding:"20px 24px 0",fontSize:12,color:"#9A7A5A",letterSpacing:1.5,textTransform:"uppercase"}}>{drink?"Editar Drink":"Novo Drink"}</div>}
          <button style={S.modalClose} onClick={onClose}><Ico d={IC.x} size={18} stroke="#9A7A5A" sw="2"/></button>
        </div>
        <div style={{padding:"0 24px 28px"}}>
          {isView&&drink&&(
            <div>
              <div style={{display:"flex",gap:8,margin:"16px 0 14px"}}>
                <button style={{...S.favChip,background:drink.favFelipe?"#FFF0D0":"#FFF8EE",border:`1.5px solid ${drink.favFelipe?"#C4922A":"#D4B896"}`,color:drink.favFelipe?"#8A5C18":"#9A7A5A"}} onClick={()=>onToggleFav(drink.id,"favFelipe")}>⭐ Felipe</button>
                <button style={{...S.favChip,background:drink.favJoana?"#FDEEF4":"#FFF8EE",border:`1.5px solid ${drink.favJoana?"#E48FAB":"#D4B896"}`,color:drink.favJoana?"#9A2060":"#9A7A5A"}} onClick={()=>onToggleFav(drink.id,"favJoana")}>💛 Joana</button>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
                {tech&&<div style={S.infoBadge}><span style={{fontSize:16}}>{tech.emoji}</span><div><div style={S.infoBadgeTitle}>{tech.label}</div><div style={S.infoBadgeSub}>{tech.desc}</div></div></div>}
                {drink.glass&&<div style={S.infoBadge}><span style={{fontSize:16}}>🥃</span><div><div style={S.infoBadgeTitle}>Copo</div><div style={S.infoBadgeSub}>{drink.glass}</div></div></div>}
                {drink.garnish&&<div style={S.infoBadge}><span style={{fontSize:16}}>🌿</span><div><div style={S.infoBadgeTitle}>Guarnição</div><div style={S.infoBadgeSub}>{drink.garnish}</div></div></div>}
              </div>
              {missing.length>0
                ?<div style={S.missingBanner}><span style={{color:"#C05000"}}>⚠ Faltam: </span>{missing.join(", ")}</div>
                :<div style={{...S.missingBanner,background:"#E8F5EC",borderColor:"#5AAA70",color:"#1A6B30"}}>✓ Você tem tudo para fazer este drink!</div>
              }
              <div style={S.viewSection}>
                <div style={S.viewLabel}>Ingredientes</div>
                {drink.ingredients.map((ing,i)=>(
                  <div key={i} style={S.viewIng}>
                    <span style={{color:bar.includes(ing)?"#1A8C40":"#C03030",fontSize:8}}>●</span>
                    <span style={{flex:1}}>{ing}</span>
                    <span style={{color:"#9A7A5A",fontSize:13}}>{drink.amounts[i]}</span>
                  </div>
                ))}
              </div>
              <div style={S.viewSection}>
                <div style={S.viewLabel}>Preparo</div>
                <div style={{color:"#3A2410",lineHeight:1.75,fontSize:14}}>{drink.instructions}</div>
              </div>
              <div style={{display:"flex",gap:10,marginTop:20}}>
                <button style={S.editBtn} onClick={()=>onEdit(drink)}><Ico d={IC.edit} size={14} stroke="currentColor"/>Editar</button>
                {!confirmDel
                  ?<button style={S.delBtn} onClick={()=>setConfirmDel(true)}><Ico d={IC.trash} size={14} stroke="currentColor"/>Excluir</button>
                  :<button style={{...S.delBtn,background:"#C03030",borderColor:"#C03030",color:"#fff"}} onClick={()=>onDelete(drink.id)}>Confirmar exclusão</button>
                }
              </div>
            </div>
          )}
          {isEdit&&(
            <div style={{paddingTop:16}}>
              <label style={S.label}>Nome do Drink</label>
              <input style={S.input} value={form.name} onChange={e=>setF("name",e.target.value)} placeholder="Ex: Negroni"/>
              <label style={S.label}>Categoria</label>
              <div style={{...S.chipRow,marginBottom:16}}>
                {CATEGORIES.map(c=><button key={c} style={{...S.chip,...(form.category===c?S.chipActive:{})}} onClick={()=>setF("category",c)}>{c}</button>)}
              </div>
              <label style={S.label}>Técnica de Preparo</label>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
                {TECHNIQUES.map(t=>(
                  <button key={t.value} style={{...S.techChip,...(form.technique===t.value?S.techChipActive:{})}} onClick={()=>setF("technique",t.value)}>
                    <span style={{fontSize:18}}>{t.emoji}</span>
                    <div><div style={{fontSize:12,fontWeight:form.technique===t.value?700:400,color:"#1C1208"}}>{t.label}</div><div style={{fontSize:10,color:"#9A7A5A"}}>{t.desc}</div></div>
                  </button>
                ))}
              </div>
              <label style={S.label}>Tipo de Copo</label>
              <select style={{...S.input,cursor:"pointer"}} value={form.glass} onChange={e=>setF("glass",e.target.value)}>
                <option value="">Selecione…</option>
                {GLASSES.map(g=><option key={g} value={g}>{g}</option>)}
              </select>
              <label style={S.label}>Guarnição</label>
              <div style={{position:"relative",marginBottom:14}}>
                <input style={{...S.input,marginBottom:0}} value={garnishInput}
                  onChange={e=>{setGarnishInput(e.target.value);setF("garnish",e.target.value);setGarnishOpen(true);}}
                  onFocus={()=>setGarnishOpen(true)} onBlur={()=>setTimeout(()=>setGarnishOpen(false),150)}
                  placeholder="Ex: Twist de Laranja"/>
                {garnishOpen&&(
                  <div style={S.autocomplete}>
                    {GARNISHES_COMMON.filter(g=>g.toLowerCase().includes(garnishInput.toLowerCase())).map(g=>(
                      <div key={g} className="ac-item" style={S.autocompleteItem} onMouseDown={()=>{setGarnishInput(g);setF("garnish",g);setGarnishOpen(false);}}>{g}</div>
                    ))}
                  </div>
                )}
              </div>
              <label style={S.label}>Foto (URL)</label>
              <input style={S.input} value={form.photo} onChange={e=>setF("photo",e.target.value)} placeholder="https://…"/>
              {!form.photo&&(
                <>
                  <label style={S.label}>Cor de Fundo</label>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
                    {COLOR_SWATCHES.map(c=><button key={c} onClick={()=>setF("color",c)} style={{width:28,height:28,borderRadius:"50%",background:c,border:form.color===c?"2.5px solid #C4922A":"2.5px solid transparent",cursor:"pointer"}}/>)}
                  </div>
                </>
              )}
              <label style={S.label}>Favoritos</label>
              <div style={{display:"flex",gap:8,marginBottom:16}}>
                <button style={{...S.favChip,background:form.favFelipe?"#FFF0D0":"#FFF8EE",border:`1.5px solid ${form.favFelipe?"#C4922A":"#D4B896"}`,color:form.favFelipe?"#8A5C18":"#9A7A5A"}} onClick={()=>setF("favFelipe",!form.favFelipe)}>⭐ Felipe</button>
                <button style={{...S.favChip,background:form.favJoana?"#FDEEF4":"#FFF8EE",border:`1.5px solid ${form.favJoana?"#E48FAB":"#D4B896"}`,color:form.favJoana?"#9A2060":"#9A7A5A"}} onClick={()=>setF("favJoana",!form.favJoana)}>💛 Joana</button>
              </div>
              <label style={S.label}>Ingredientes</label>
              {form.ingredients.map((ing,i)=>(
                <div key={i} style={{display:"flex",gap:8,marginBottom:8}}>
                  <IngAC value={ing} onChange={v=>setIng(i,v)}/>
                  <input style={{...S.input,width:80,marginBottom:0,flexShrink:0}} value={form.amounts[i]||""} onChange={e=>setAmt(i,e.target.value)} placeholder="Qtd"/>
                  {form.ingredients.length>1&&<button style={S.removeBtn} onClick={()=>removeIng(i)}><Ico d={IC.x} size={14} stroke="#C03030" sw="2.5"/></button>}
                </div>
              ))}
              <button style={S.ghostBtn} onClick={addIngRow}><Ico d={IC.plus} size={14} stroke="#9A7A5A"/>Adicionar ingrediente</button>
              <label style={{...S.label,marginTop:16}}>Modo de Preparo</label>
              <textarea style={{...S.input,minHeight:90,resize:"vertical"}} value={form.instructions} onChange={e=>setF("instructions",e.target.value)} placeholder="Descreva o preparo…"/>
              <button style={{...S.addBtn,width:"100%",justifyContent:"center",marginTop:8,padding:"12px",fontSize:14}} onClick={()=>form.name.trim()&&onSave(form)}>
                <Ico d={IC.check} size={16} stroke="#fff" sw="2.5"/>Salvar Drink
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── IngAC ────────────────────────────────────────────────────────────────────
function IngAC({value,onChange}) {
  const [open,setOpen]=useState(false);
  const sugs=useMemo(()=>value.length>1?INGREDIENT_LIST.filter(i=>i.toLowerCase().includes(value.toLowerCase())).slice(0,6):[],[value]);
  return (
    <div style={{flex:1,position:"relative"}}>
      <input style={{...S.input,marginBottom:0}} value={value}
        onChange={e=>{onChange(e.target.value);setOpen(true);}}
        onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),150)} placeholder="Ingrediente"/>
      {open&&sugs.length>0&&(
        <div style={S.autocomplete}>
          {sugs.map(s=><div key={s} className="ac-item" style={S.autocompleteItem} onMouseDown={()=>{onChange(s);setOpen(false);}}>{s}</div>)}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
