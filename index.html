<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1f2937;--border:#2d3748;
  --text:#e2e8f0;--text2:#94a3b8;--accent:#f97316;--accent2:#ea580c;
  --green:#10b981;--blue:#3b82f6;--yellow:#f59e0b;--purple:#8b5cf6;
  --teal:#14b8a6;--red:#ef4444;--r:10px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
h1,h2,h3,h4{font-family:'Syne',sans-serif}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
a{text-decoration:none}
.hidden{display:none!important}
.spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%}

/* LOGIN */
#login-page{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 20% 50%,rgba(249,115,22,.07) 0%,transparent 55%),var(--bg);z-index:100}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.login-brand{text-align:center;margin-bottom:32px}
.login-brand .logo-icon{font-size:40px;margin-bottom:12px;display:block}
.login-brand h1{font-size:24px;color:var(--text);margin-bottom:4px}
.login-brand p{color:var(--text2);font-size:14px}
.login-form{display:flex;flex-direction:column;gap:14px}
.inp-group{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:0 14px;color:var(--text2);transition:border-color .15s}
.inp-group:focus-within{border-color:var(--accent)}
.inp-group span{font-size:17px;flex-shrink:0}
.inp-group input{flex:1;background:none;border:none;outline:none;color:var(--text);padding:13px 0;font-size:15px}
.login-err{color:var(--red);font-size:13px;text-align:center;display:none}

/* APP LAYOUT */
#app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-brand{display:flex;align-items:center;gap:10px;padding:22px 18px;border-bottom:1px solid var(--border)}
.sb-brand .ico{font-size:26px}
.sb-brand h2{font-size:15px;color:var(--text);line-height:1.2}
.sb-brand small{color:var(--text2);font-size:11px;font-family:'DM Sans',sans-serif;font-weight:400}
.sb-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:3px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--text2);background:none;border:none;cursor:pointer;font-size:14px;font-weight:500;width:100%;transition:all .15s;text-align:left;position:relative}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:rgba(249,115,22,.15);color:var(--accent)}
.nav-btn .ico{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.nav-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;margin-left:auto}
.sb-foot{padding:14px;border-top:1px solid var(--border)}
.sb-email{display:block;font-size:11px;color:var(--text2);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.main{flex:1;overflow-y:auto}

/* PAGE */
.page{padding:28px 32px;max-width:1100px;animation:fadeIn .2s ease}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:26px;gap:16px;flex-wrap:wrap}
.page-hdr h1{font-size:24px}
.page-hdr p{color:var(--text2);font-size:13px;margin-top:3px}
.hdr-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{background:var(--green);color:#fff;border:none}
.btn-green:hover{background:#0ea472;transform:translateY(-1px)}
.btn-sm{padding:7px 13px;font-size:13px}
.btn-full{width:100%;justify-content:center;padding:14px;font-size:16px;margin-top:6px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px;margin-bottom:28px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;display:flex;align-items:center;gap:13px}
.stat-ico{width:42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.c-blue .stat-ico{background:rgba(59,130,246,.12);color:var(--blue)}
.c-green .stat-ico{background:rgba(16,185,129,.12);color:var(--green)}
.c-yellow .stat-ico{background:rgba(245,158,11,.12);color:var(--yellow)}
.c-purple .stat-ico{background:rgba(139,92,246,.12);color:var(--purple)}
.c-teal .stat-ico{background:rgba(20,184,166,.12);color:var(--teal)}
.c-red .stat-ico{background:rgba(239,68,68,.12);color:var(--red)}
.c-orange .stat-ico{background:rgba(249,115,22,.12);color:var(--accent)}
.stat-val{display:block;font-size:20px;font-weight:700;font-family:'Syne',sans-serif}
.stat-lbl{display:block;font-size:12px;color:var(--text2);margin-top:1px}

/* TABLE */
.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead{background:var(--bg3)}
th{padding:11px 14px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);white-space:nowrap}
td{padding:11px 14px;border-top:1px solid var(--border);color:var(--text)}
tr:hover td{background:rgba(255,255,255,.02)}
.empty-row{text-align:center;color:var(--text2);padding:48px!important}

/* BADGES */
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.b-green{background:rgba(16,185,129,.12);color:var(--green)}
.b-blue{background:rgba(59,130,246,.12);color:var(--blue)}
.b-yellow{background:rgba(245,158,11,.12);color:var(--yellow)}
.b-purple{background:rgba(139,92,246,.12);color:var(--purple)}
.b-teal{background:rgba(20,184,166,.12);color:var(--teal)}
.b-orange{background:rgba(249,115,22,.12);color:var(--accent)}
.b-red{background:rgba(239,68,68,.12);color:var(--red)}

/* STATUS SELECT */
.sts-sel{padding:4px 8px;border-radius:6px;border:1px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;outline:none;background:var(--bg3);color:var(--text)}
.sts-pago_pix{background:rgba(16,185,129,.1);color:var(--green);border-color:rgba(16,185,129,.2)}
.sts-pago_cartao{background:rgba(59,130,246,.1);color:var(--blue);border-color:rgba(59,130,246,.2)}
.sts-pgto_parcial{background:rgba(249,115,22,.1);color:var(--accent);border-color:rgba(249,115,22,.2)}
.sts-aguard_confirm{background:rgba(245,158,11,.1);color:var(--yellow);border-color:rgba(245,158,11,.2)}
.sts-cortesia{background:rgba(139,92,246,.1);color:var(--purple);border-color:rgba(139,92,246,.2)}
.sts-cancelado{background:rgba(239,68,68,.1);color:var(--red);border-color:rgba(239,68,68,.2)}

/* FILTERS */
.filters{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:0 12px;flex:1;min-width:200px;color:var(--text2)}
.search-box:focus-within{border-color:var(--accent)}
.search-box input{background:none;border:none;outline:none;color:var(--text);padding:10px 0;width:100%;font-size:14px}
.filter-sel{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;cursor:pointer;outline:none}

/* LINK CARD */
.link-card{display:flex;align-items:center;gap:20px;background:var(--bg2);border:1px solid rgba(249,115,22,.25);border-radius:var(--r);padding:18px 22px;margin-bottom:22px;flex-wrap:wrap}
.link-info{flex:1;display:flex;flex-direction:column;gap:8px;min-width:180px}
.link-lbl{font-size:12px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.link-url{font-size:13px;color:var(--accent);background:rgba(249,115,22,.07);padding:8px 12px;border-radius:6px;word-break:break-all;font-family:monospace}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:26px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 48px rgba(0,0,0,.6)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-header h2{font-size:19px;margin:0}
.modal-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:0;line-height:1;transition:color .15s}
.modal-close:hover{color:var(--text)}
.modal h2{font-size:19px;margin-bottom:20px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.03em}
.field input,.field select,.field textarea{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:80px}
select option{background:var(--bg3)}

/* GASTOS */
.gastos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.gasto-cat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.gasto-cat-hdr{display:flex;justify-content:space-between;padding:13px 16px;background:var(--bg3);border-bottom:1px solid var(--border)}
.gasto-cat-name{font-weight:600;font-size:14px}
.gasto-cat-total{font-weight:700;color:var(--accent);font-family:'Syne',sans-serif}
.gasto-item{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-top:1px solid var(--border)}

/* MATERIAIS */
.mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.mat-cat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.mat-cat-title{padding:12px 16px;font-size:13px;font-weight:700;background:var(--bg3);border-bottom:1px solid var(--border);color:var(--accent);text-transform:uppercase;letter-spacing:.04em}
.mat-list{padding:8px;display:flex;flex-direction:column;gap:4px}
.mat-item{display:flex;justify-content:space-between;align-items:flex-start;padding:11px;border-radius:7px;background:rgba(255,255,255,.02);border:1px solid var(--border)}
.mat-info{flex:1;display:flex;flex-direction:column;gap:3px}
.mat-nome{font-size:13.5px;font-weight:600}
.mat-desc{font-size:12px;color:var(--text2)}
.mat-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--blue);margin-top:3px}
.mat-link:hover{text-decoration:underline}

/* CONFIG */
.config-sections{display:flex;flex-direction:column;gap:22px}
.config-sec{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:22px}
.config-sec h2{font-size:15px;margin-bottom:18px;padding-bottom:11px;border-bottom:1px solid var(--border);color:var(--text2)}

/* BALANCE */
.balance{padding:8px 16px;border-radius:8px;font-weight:700;font-family:'Syne',sans-serif;font-size:15px}
.balance.pos{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.balance.neg{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.total-tag{padding:8px 16px;border-radius:8px;font-weight:700;font-family:'Syne',sans-serif;font-size:14px;background:rgba(249,115,22,.1);color:var(--accent);border:1px solid rgba(249,115,22,.2)}

/* EMPTY */
.empty{text-align:center;padding:56px 20px;color:var(--text2)}
.empty .ico{font-size:48px;opacity:.3;margin-bottom:14px}
.empty p{font-size:15px}

/* ICON BTN */
.ico-btn{padding:6px;border-radius:6px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text2);transition:all .15s;display:inline-flex;align-items:center;justify-content:center;font-size:14px}
.ico-btn:hover{border-color:var(--red);color:var(--red)}
.ico-btn.edit:hover{border-color:var(--blue);color:var(--blue)}
.ico-btn.confirm:hover{border-color:var(--green);color:var(--green)}

/* NOTIF PANEL */
.notif-list{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.notif-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.notif-item.nova{border-left:3px solid var(--accent)}
.notif-item.pagamento{border-left:3px solid var(--green)}
.notif-info{flex:1}
.notif-title{font-weight:700;font-size:14px;margin-bottom:4px}
.notif-sub{font-size:13px;color:var(--text2)}
.notif-time{font-size:11px;color:var(--text2);white-space:nowrap}

/* PUBLIC PAGE */
#public-page{min-height:100vh;background:var(--bg);display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;background-image:radial-gradient(ellipse at 20% 0%,rgba(249,115,22,.08) 0%,transparent 50%)}
.pub-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:580px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.pub-hdr{padding:30px;background:linear-gradient(135deg,rgba(249,115,22,.1),rgba(59,130,246,.06));border-bottom:1px solid var(--border);text-align:center}
.pub-hdr .ico{font-size:40px;margin-bottom:10px;display:block}
.pub-hdr h1{font-size:22px;color:var(--text);margin-bottom:8px}
.pub-desc{color:var(--text2);font-size:14px;margin-bottom:14px}
.pub-meta{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;font-size:13px;color:var(--text2)}
.pub-form{padding:26px}
.pub-form h2{font-size:17px;margin-bottom:18px}
.radio-group{display:flex;gap:10px;flex-wrap:wrap;padding:2px 0}
.radio-opt{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:14px;color:var(--text);padding:8px 13px;border:1px solid var(--border);border-radius:8px;transition:all .15s}
.radio-opt.selected{border-color:var(--accent);background:rgba(249,115,22,.08);color:var(--accent)}

/* CONFIRM */
.confirm-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;padding:38px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.confirm-ico{font-size:54px;margin-bottom:14px}
.confirm-card h1{font-size:24px;margin-bottom:10px}
.confirm-card .sub{color:var(--text2);font-size:15px;margin-bottom:6px}
.pix-box{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:var(--r);padding:18px;margin:16px 0;text-align:left}
.pix-box-hdr{font-weight:700;font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.pix-key-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pix-key-row code{flex:1;background:var(--bg3);padding:8px 12px;border-radius:6px;font-size:13px;word-break:break-all}
.cartao-box{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);border-radius:var(--r);padding:18px;margin:16px 0}
.cartao-box-hdr{font-weight:700;font-size:14px;margin-bottom:12px}
.info-box{margin-top:16px;background:var(--bg3);border-radius:9px;padding:14px;display:flex;flex-direction:column;gap:6px;font-size:13px;color:var(--text2);text-align:left}

/* AVISO PAGAMENTO */
.aviso-pgto-box{background:rgba(249,115,22,.06);border:1px solid rgba(249,115,22,.2);border-radius:var(--r);padding:20px;margin:20px 0;text-align:left}
.aviso-pgto-box h3{font-size:15px;margin-bottom:12px;color:var(--accent)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:12px 18px;border-radius:10px;font-size:14px;z-index:9999;animation:fadeIn .2s ease;box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:300px}
.toast.ok{border-color:rgba(16,185,129,.4);color:var(--green)}
.toast.err{border-color:rgba(239,68,68,.4);color:var(--red)}

/* RESPONSIVE */
@media(max-width:700px){
  /* Layout */
  #app{flex-direction:column;height:100vh}
  .sidebar{width:100%;height:auto;flex-shrink:0;border-right:none;border-bottom:1px solid var(--border)}
  .sb-brand{display:none}
  .sb-foot{display:none}
  .sb-nav{flex-direction:row;overflow-x:auto;padding:0;gap:0;border-top:none}
  .nav-btn{flex-direction:column;gap:3px;padding:10px 6px;border-radius:0;flex:1;justify-content:center;min-width:52px;font-size:10px}
  .nav-btn .ico{font-size:20px;width:auto}
  .nav-btn span{display:block;font-size:10px;line-height:1}
  .nav-btn.active{background:rgba(249,115,22,.12);border-bottom:2px solid var(--accent)}
  .nav-badge{position:absolute;top:6px;right:6px;padding:1px 5px}
  .nav-btn{position:relative}
  .main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

  /* Content */
  .page{padding:14px}
  .page-hdr{margin-bottom:16px}
  .page-hdr h1{font-size:20px}
  .hdr-actions{gap:6px}
  .hdr-actions .btn{padding:8px 10px;font-size:13px}

  /* Stats */
  .stats-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
  .stat{padding:14px 12px;gap:10px}
  .stat-val{font-size:17px}
  .stat-ico{width:36px;height:36px;font-size:16px}

  /* Form */
  .form-grid{grid-template-columns:1fr}

  /* Balance */
  .balance,.total-tag{font-size:13px;padding:6px 12px}

  /* Gastos grid */
  .gastos-grid{grid-template-columns:1fr}
  .mat-grid{grid-template-columns:1fr}

</head>
<body>

<div id="loading-screen">
  <div class="spinner spin"></div>
  <p style="color:var(--text2);font-size:14px;margin-top:8px">Carregando...</p>
</div>

<div id="login-page" class="hidden">
  <div class="login-card">
    <div class="login-brand">
      <span class="logo-icon">🎓</span>
      <h1>Gestor de Cursos</h1>
      <p>Painel administrativo · OrtoFlix</p>
    </div>
    <div class="login-form">
      <div class="inp-group"><span>✉️</span><input type="email" id="login-email" placeholder="Email"/></div>
      <div class="inp-group"><span>🔒</span><input type="password" id="login-pass" placeholder="Senha"/></div>
      <p class="login-err" id="login-err">Email ou senha incorretos</p>
      <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Entrar</button>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <aside class="sidebar">
    <div class="sb-brand">
      <span class="ico">🎓</span>
      <div><h2>Gestor de Cursos</h2><small>OrtoFlix</small></div>
    </div>
    <nav class="sb-nav">
      <button class="nav-btn active" data-page="dashboard" onclick="goTo('dashboard')"><span class="ico">📊</span><span>Dashboard</span></button>
      <button class="nav-btn" data-page="notificacoes" onclick="goTo('notificacoes')" id="nav-notif"><span class="ico">🔔</span><span>Notificações</span></button>
      <button class="nav-btn" data-page="inscricoes" onclick="goTo('inscricoes')"><span class="ico">👥</span><span>Inscrições</span></button>
      <button class="nav-btn" data-page="gastos" onclick="goTo('gastos')"><span class="ico">💰</span><span>Gastos</span></button>
      <button class="nav-btn" data-page="config" onclick="goTo('config')"><span class="ico">⚙️</span><span>Config. Curso</span></button>
    </nav>
    <div class="sb-foot">
      <span class="sb-email" id="sb-email"></span>
      <button class="btn btn-outline btn-sm" style="width:100%" onclick="doLogout()">🚪 Sair</button>
    </div>
  </aside>
  <main class="main" id="main-content"></main>
</div>

<div id="public-page" class="hidden"></div>

<script>
// ══════════════════════════
// FIREBASE CONFIG
// ══════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyAq9ix8gVMn8lr7xtx49yUCDDI4fnpUuiI",
  authDomain: "cursomanager-53218.firebaseapp.com",
  projectId: "cursomanager-53218",
  storageBucket: "cursomanager-53218.firebasestorage.app",
  messagingSenderId: "250558746109",
  appId: "1:250558746109:web:ed58b1388c7940103ddd94"
};
firebase.initializeApp(firebaseConfig);
const db   = firebase.firestore();
const auth = firebase.auth();

// ══════════════════════════
// EMAILJS
// ══════════════════════════
emailjs.init('FjaSDa-O3hhpVQ2mJ');
const EJ_SERVICE  = 'service_pdplefb';
const EJ_TMPL_INSC = 'template_803p8n1';
const EJ_TMPL_PGTO = 'template_ohy2woh';

function sendEmail(templateId, params){
  return emailjs.send(EJ_SERVICE, templateId, params).catch(e=>console.warn('EmailJS:', e));
}

// ══════════════════════════
// STATE
// ══════════════════════════
let curso = null;
let inscricoes = [];
let gastos = [];
let materiais = [];
let notificacoes = [];
let unsubInsc, unsubGastos, unsubMat, unsubCurso, unsubNotif;
let currentPage = '';

// ══════════════════════════
// HELPERS
// ══════════════════════════
function show(id){ document.getElementById(id).classList.remove('hidden') }
function hide(id){ document.getElementById(id).classList.add('hidden') }
function toast(msg, type='ok'){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t = document.createElement('div');
  t.className = `toast ${type}`; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3500);
}
function fmtBRL(v){ return 'R$ ' + (parseFloat(v)||0).toFixed(2).replace('.',',') }
function fmtDate(ts){ if(!ts) return '-'; const d = ts.toDate ? ts.toDate() : new Date(ts); return d.toLocaleDateString('pt-BR'); }
function statusLabel(s){ return {pago_pix:'Pago PIX',pago_cartao:'Pago Cartão',aguard_confirm:'Aguard. Confirmação',pgto_parcial:'Pgto. Parcial',cortesia:'Cortesia',cancelado:'Cancelado'}[s]||s }
function statusClass(s){ return {pago_pix:'b-green',pago_cartao:'b-blue',aguard_confirm:'b-yellow',pgto_parcial:'b-orange',cortesia:'b-purple',cancelado:'b-red'}[s]||'' }

// ══════════════════════════
// PUBLIC ROUTE DETECTION
// ══════════════════════════
const hashNow = window.location.hash;
const isPublic = hashNow.startsWith('#/inscricao');
const isAvisar = hashNow.startsWith('#/avisar/');

// ══════════════════════════
// AUTH
// ══════════════════════════
auth.onAuthStateChanged(user => {
  hide('loading-screen');
  if(isPublic){ showPublicPage(); return; }
  if(isAvisar){ showAvisarPage(); return; }
  if(user){
    document.getElementById('sb-email').textContent = user.email;
    show('app'); startListeners(); goTo('dashboard');
  } else { show('login-page'); }
});

function doLogin(){
  const email = document.getElementById('login-email').value;
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-err');
  btn.textContent='Entrando...'; btn.disabled=true; err.style.display='none';
  
  // Timeout fallback — if Firebase takes too long, reset button
  const timeout = setTimeout(()=>{
    btn.textContent='Entrar'; btn.disabled=false;
    err.textContent='Conexão lenta. Tente novamente.';
    err.style.display='block';
  }, 10000);

  auth.signInWithEmailAndPassword(email, pass)
    .then(()=>{ clearTimeout(timeout); })
    .catch(()=>{ 
      clearTimeout(timeout);
      err.textContent='Email ou senha incorretos';
      err.style.display='block'; 
      btn.textContent='Entrar'; 
      btn.disabled=false; 
    });
}
document.addEventListener('keydown', e=>{ if(e.key==='Enter' && !document.getElementById('login-page').classList.contains('hidden')) doLogin(); });

function doLogout(){
  auth.signOut();
  [unsubInsc,unsubGastos,unsubMat,unsubCurso,unsubNotif].forEach(u=>u&&u());
  hide('app'); show('login-page');
}

// ══════════════════════════
// LISTENERS
// ══════════════════════════
function startListeners(){
  // Config e notificações: tempo real (críticos)
  unsubCurso = db.collection('config').doc('curso').onSnapshot(snap=>{
    curso = snap.exists ? snap.data() : null;
    if(currentPage==='dashboard') renderDashboard();
    if(currentPage==='config') renderConfig();
  });

  unsubNotif = db.collection('notificacoes').onSnapshot(snap=>{
    notificacoes = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.criadoEm?.seconds||0)-(a.criadoEm?.seconds||0));
    updateNotifBadge();
    if(currentPage==='notificacoes') renderNotificacoes();
  });

  // Inscrições: tempo real (dashboard precisa)
  unsubInsc = db.collection('inscricoes').onSnapshot(snap=>{
    inscricoes = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.nome||'').localeCompare(b.nome||'','pt-BR'));
    if(currentPage==='inscricoes') renderInscricoes();
    if(currentPage==='dashboard') renderDashboard();
  });

  // Gastos: carrega uma vez, recarrega ao navegar
  db.collection('gastos').get().then(snap=>{
    gastos = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(currentPage==='gastos') renderGastos();
    if(currentPage==='dashboard') renderDashboard();
  });
}

// Reload gastos ao entrar na aba (dados frescos sem listener contínuo)
function reloadGastos(cb){
  db.collection('gastos').get().then(snap=>{
    gastos = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(cb) cb();
  });
}

function updateNotifBadge(){
  const naoLidas = notificacoes.filter(n=>!n.lida).length;
  const nav = document.getElementById('nav-notif');
  if(!nav) return;
  const existing = nav.querySelector('.nav-badge');
  if(existing) existing.remove();
  if(naoLidas > 0){
    const badge = document.createElement('span');
    badge.className = 'nav-badge'; badge.textContent = naoLidas;
    nav.appendChild(badge);
  }
}

// ══════════════════════════
// NAVIGATION
// ══════════════════════════
function goTo(page){
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.page===page));
  if(page==='gastos'){ reloadGastos(renderGastos); }
  else { ({dashboard:renderDashboard, notificacoes:renderNotificacoes, inscricoes:renderInscricoes, config:renderConfig})[page]?.(); }
}

// ══════════════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════════════
function renderDashboard(){
  const pagos   = inscricoes.filter(i=>i.status==='pago_pix'||i.status==='pago_cartao'||i.status==='cortesia');
  const aguard  = inscricoes.filter(i=>i.status==='aguard_confirm');
  const parcial = inscricoes.filter(i=>i.status==='pgto_parcial');
  const totalG  = gastos.reduce((s,g)=>s+(g.valor||0),0);

  // Receita BRUTA: PIX à vista pago + cartão valor cheio + PIX parcelado valor TOTAL (incl. parcelas futuras)
  const receitaBruta = inscricoes.reduce((s,i)=>{
    const isCartao = (i.formaPagamento||'').includes('Cartão');
    const isPix3x  = (i.formaPagamento||'').includes('3x');
    if(isCartao) return s + (i.valorFinal||0);
    if(isPix3x)  return s + (i.valorFinal||0); // total incluindo parcelas futuras
    return s + (i.valorPago||0);
  },0);

  // Receita LÍQUIDA: PIX à vista pago + cartão valor líquido digitado + PIX parcelado só parcelas pagas
  const receitaLiq = inscricoes.reduce((s,i)=>{
    const isCartao = (i.formaPagamento||'').includes('Cartão');
    const isPix3x  = (i.formaPagamento||'').includes('3x');
    if(isCartao) return s + (i.valorLiquido||0);
    if(isPix3x)  return s + (i.valorPago||0); // só parcelas efetivamente pagas
    return s + (i.valorPago||0);
  },0);

  // Lucro Líquido PREVISTO: igual líquida + parcelas PIX 3x ainda não pagas
  const receitaPrevista = inscricoes.reduce((s,i)=>{
    const isCartao = (i.formaPagamento||'').includes('Cartão');
    const isPix3x  = (i.formaPagamento||'').includes('3x');
    if(isCartao) return s + (i.valorLiquido||0);
    if(isPix3x)  return s + (i.valorFinal||0); // valor total assumindo que todos vão quitar
    return s + (i.valorPago||0);
  },0);

  const saldo        = receitaLiq - totalG;
  const saldoPrevisto = receitaPrevista - totalG;
  const naoLidas = notificacoes.filter(n=>!n.lida).length;

  document.getElementById('main-content').innerHTML = `
  <div class="page fade-in">
    <div class="page-hdr">
      <div>
        <h1>${curso?.nome||'Nenhum curso configurado'}</h1>
        <p>${curso?(curso.data||'')+(curso.local?' · '+curso.local:''):'Configure em ⚙️ Config. Curso'}</p>
      </div>
      <div class="${saldo>=0?'balance pos':'balance neg'}">Saldo líquido: ${fmtBRL(saldo)} <span style="font-size:11px;opacity:.7">(previsto: ${fmtBRL(saldoPrevisto)})</span></div>
    </div>

    ${naoLidas>0?`<div style="background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.25);border-radius:var(--r);padding:14px 18px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
      <span>🔔 Você tem <strong>${naoLidas} notificação(ões)</strong> não lida(s)</span>
      <button class="btn btn-outline btn-sm" onclick="goTo('notificacoes')">Ver notificações</button>
    </div>`:''}

    <div class="stats-grid">
      <div class="stat c-blue"><div class="stat-ico">👥</div><div><span class="stat-val">${inscricoes.length}</span><span class="stat-lbl">Total Inscritos</span></div></div>
      <div class="stat c-green"><div class="stat-ico">✅</div><div><span class="stat-val">${pagos.length}</span><span class="stat-lbl">Confirmados</span></div></div>
      <div class="stat c-yellow"><div class="stat-ico">⏳</div><div><span class="stat-val">${aguard.length}</span><span class="stat-lbl">Aguard. Confirmação</span></div></div>
      <div class="stat c-orange"><div class="stat-ico">💰</div><div><span class="stat-val">${parcial.length}</span><span class="stat-lbl">Pgto. Parcial</span></div></div>
      <div class="stat c-teal"><div class="stat-ico">📊</div><div><span class="stat-val">${fmtBRL(receitaBruta)}</span><span class="stat-lbl">Receita Bruta</span></div></div>
      <div class="stat c-blue"><div class="stat-ico">💳</div><div><span class="stat-val">${fmtBRL(receitaLiq)}</span><span class="stat-lbl">Receita Líquida</span></div></div>
      <div class="stat c-purple"><div class="stat-ico">🔮</div><div><span class="stat-val">${fmtBRL(receitaPrevista)}</span><span class="stat-lbl">Previsto (c/ parcelas)</span></div></div>
      <div class="stat c-red"><div class="stat-ico">💸</div><div><span class="stat-val">${fmtBRL(totalG)}</span><span class="stat-lbl">Total Gastos</span></div></div>
    </div>

    ${inscricoes.length?`
    <h3 style="margin-bottom:14px;color:var(--text2);font-size:15px">Últimas inscrições</h3>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Nome</th><th>Pagamento</th><th>Valor</th><th>Status</th></tr></thead>
      <tbody>${[...inscricoes].sort((a,b)=>(b.criadoEm?.seconds||0)-(a.criadoEm?.seconds||0)).slice(0,5).map(i=>`
      <tr>
        <td><strong>${i.nome}</strong></td>
        <td>${i.formaPagamento||'-'}</td>
        <td>${fmtBRL(i.valorFinal)}</td>
        <td><span class="badge ${statusClass(i.status)}">${statusLabel(i.status)}</span></td>      </tr>`).join('')}</tbody>
    </table></div>`:'<div class="empty"><div class="ico">📋</div><p>Nenhuma inscrição ainda.</p></div>'}
  </div>`;
}

// ══════════════════════════════════════════════════════
// NOTIFICAÇÕES
// ══════════════════════════════════════════════════════
function renderNotificacoes(){
  // Marca todas como lidas
  notificacoes.filter(n=>!n.lida).forEach(n=>{
    db.collection('notificacoes').doc(n.id).update({lida:true});
  });

  document.getElementById('main-content').innerHTML = `
  <div class="page fade-in">
    <div class="page-hdr">
      <div><h1>Notificações</h1><p>${notificacoes.length} no total</p></div>
      ${notificacoes.length?`<button class="btn btn-outline btn-sm" onclick="limparNotif()">🗑️ Limpar todas</button>`:''}
    </div>

    ${notificacoes.length===0?'<div class="empty"><div class="ico">🔔</div><p>Nenhuma notificação ainda.</p></div>':''}

    <div class="notif-list">
      ${notificacoes.map(n=>`
      <div class="notif-item ${n.tipo}" id="notif-${n.id}">
        <div class="notif-info">
          <div class="notif-title">${n.tipo==='nova'?'🎓 Nova inscrição':'💰 Aviso de pagamento'}: <strong>${n.nomeAluno}</strong></div>
          <div class="notif-sub">${n.detalhe||''}</div>
          ${n.tipo==='pagamento'&&n.inscricaoId?`
          <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-green btn-sm" onclick="confirmarPagamento('${n.inscricaoId}','${n.id}')">✅ Confirmar pagamento</button>
            <button class="btn btn-outline btn-sm" onclick="goTo('inscricoes')">Ver inscrição</button>
          </div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <span class="notif-time">${fmtDate(n.criadoEm)}</span>
          <button class="ico-btn" onclick="deletarNotif('${n.id}')">🗑️</button>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

async function confirmarPagamento(inscId, notifId){
  const insc = inscricoes.find(i=>i.id===inscId);
  if(!insc){ toast('Inscrição não encontrada','err'); return; }
  const novoStatus = insc.formaPagamento?.includes('Cartão') ? 'pago_cartao' : 'pago_pix';
  await db.collection('inscricoes').doc(inscId).update({ status: novoStatus, valorPago: insc.valorFinal||0 });
  await db.collection('notificacoes').doc(notifId).delete();
  toast('Pagamento confirmado! ✅');
}

async function deletarNotif(id){
  await db.collection('notificacoes').doc(id).delete();
}

async function limparNotif(){
  if(!confirm('Limpar todas as notificações?')) return;
  const batch = db.batch();
  notificacoes.forEach(n=>batch.delete(db.collection('notificacoes').doc(n.id)));
  await batch.commit();
  toast('Notificações limpas');
}

// ══════════════════════════════════════════════════════
// INSCRIÇÕES
// ══════════════════════════════════════════════════════
let inscFiltroStatus = 'todos';
let inscBusca = '';

function renderInscricoes(){
  const publicLink = `${location.origin}/#/inscricao`;
  const filtradas = inscricoes.filter(i=>{
    const mb = !inscBusca||(i.nome||'').toLowerCase().includes(inscBusca.toLowerCase())||(i.email||'').toLowerCase().includes(inscBusca.toLowerCase())||(i.telefone||'').includes(inscBusca);
    const ms = inscFiltroStatus==='todos'||i.status===inscFiltroStatus;
    return mb && ms;
  });

  document.getElementById('main-content').innerHTML = `
  <div class="page fade-in">
    <div class="page-hdr">
      <div><h1>Inscrições</h1><p>${inscricoes.length} inscrito(s)</p></div>
      <div class="hdr-actions">
        <button class="btn btn-outline" onclick="exportarExcel()">📊 Excel</button>
        <button class="btn btn-outline" onclick="exportarPDF()">📄 PDF</button>
        <button class="btn btn-outline" onclick="toggleLinkCard()">🔗 Link Público</button>
        <button class="btn btn-primary" onclick="openAddInsc()">➕ Adicionar</button>
      </div>
    </div>

    <div id="link-card-wrap" class="hidden">
      <div class="link-card">
        <div class="link-info">
          <span class="link-lbl">Link de inscrição para alunos</span>
          <code class="link-url">${publicLink}</code>
          <button class="btn btn-outline btn-sm" onclick="copyText('${publicLink}')">📋 Copiar</button>
        </div>
      </div>
    </div>

    <div class="filters">
      <div class="search-box"><span>🔍</span><input placeholder="Buscar..." value="${inscBusca}" oninput="inscBusca=this.value;renderInscricoes()"/></div>
      <select class="filter-sel" onchange="inscFiltroStatus=this.value;renderInscricoes()">
        <option value="todos" ${inscFiltroStatus==='todos'?'selected':''}>Todos</option>
        <option value="aguard_confirm" ${inscFiltroStatus==='aguard_confirm'?'selected':''}>Aguard. Confirmação</option>
        <option value="pgto_parcial" ${inscFiltroStatus==='pgto_parcial'?'selected':''}>Pgto. Parcial</option>
        <option value="pago_pix" ${inscFiltroStatus==='pago_pix'?'selected':''}>Pago PIX</option>
        <option value="pago_cartao" ${inscFiltroStatus==='pago_cartao'?'selected':''}>Pago Cartão</option>
        <option value="cortesia" ${inscFiltroStatus==='cortesia'?'selected':''}>Cortesia</option>
        <option value="cancelado" ${inscFiltroStatus==='cancelado'?'selected':''}>Cancelado</option>
      </select>
    </div>

    <div class="tbl-wrap"><table>
      <thead><tr><th>Nome</th><th>Contato</th><th>Pagamento</th><th>Fidelidade</th><th>Bruto</th><th>Líquido</th><th>Pago</th><th>Falta</th><th>Status</th><th></th></tr></thead>
      <tbody>
        ${filtradas.length===0?`<tr><td colspan="10" class="empty-row">Nenhuma inscrição encontrada</td></tr>`:
          filtradas.map(i=>{
            const valorTotal = i.valorFinal||0;
            const valorPago  = i.valorPago||0;
            const valorLiq   = i.valorLiquido!==undefined ? i.valorLiquido : '';
            const falta      = Math.max(0, valorTotal - valorPago);
            const isPix3x    = (i.formaPagamento||'').includes('3x');
            const isCartao   = (i.formaPagamento||'').includes('Cartão');
            return `
            <tr>
              <td><strong>${i.nome||''}</strong><br><span style="font-size:11px;color:var(--text2)">${i.faculdade||''}</span></td>
              <td style="font-size:12px">${i.telefone||''}<br><span style="color:var(--text2)">${i.email||''}</span></td>
              <td>${i.formaPagamento||'-'}</td>
              <td><span class="badge ${i.fidelidade==='sim'?'b-purple':'b-teal'}">${i.fidelidade==='sim'?'🤝':'Normal'}</span></td>
              <td style="font-weight:700;font-family:'Syne',sans-serif">${fmtBRL(valorTotal)}</td>

// ── PARCELAS PIX ──
async function openParcelas(id){
  const insc = inscricoes.find(i=>i.id===id);
  if(!insc) return;
  const valorTotal = insc.valorFinal||0;
  const valorPago  = insc.valorPago||0;
  const falta = Math.max(0, valorTotal - valorPago);
  const pagamentos = insc.pagamentos||[];

  document.body.insertAdjacentHTML('beforeend',`
  <div class="overlay" id="parc-modal" onclick="closeIfOverlay(event,'parc-modal')">
    <div class="modal">
      <div class="modal-header"><h2>💰 Parcelas — ${insc.nome}</h2><button class="modal-close" onclick="closeModal('parc-modal')">✕</button></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;text-align:center">
        <div style="background:var(--bg3);border-radius:8px;padding:12px">
          <div style="font-size:11px;color:var(--text2);margin-bottom:4px">TOTAL</div>
          <div style="font-weight:700;font-family:'Syne',sans-serif">${fmtBRL(valorTotal)}</div>
        </div>
        <div style="background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:12px">
          <div style="font-size:11px;color:var(--text2);margin-bottom:4px">PAGO</div>
          <div style="font-weight:700;font-family:'Syne',sans-serif;color:var(--green)">${fmtBRL(valorPago)}</div>
        </div>
        <div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:12px">
          <div style="font-size:11px;color:var(--text2);margin-bottom:4px">FALTA</div>
          <div style="font-weight:700;font-family:'Syne',sans-serif;color:${falta>0?'var(--yellow)':'var(--green)'}">${falta>0?fmtBRL(falta):'✅ Quitado'}</div>
        </div>
      </div>

      ${pagamentos.length>0?`
      <h3 style="font-size:14px;color:var(--text2);margin-bottom:10px">Histórico de pagamentos</h3>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:18px">
        ${pagamentos.map((p,idx)=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg3);border-radius:7px;font-size:13px">
          <span>Parcela ${idx+1} — ${p.data}</span>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-weight:700;color:var(--green)">${fmtBRL(p.valor)}</span>
            <button class="ico-btn" onclick="removerParcela('${id}',${idx})" title="Remover">🗑️</button>
          </div>
        </div>`).join('')}
      </div>`:''}

      ${falta>0?`
      <h3 style="font-size:14px;color:var(--text2);margin-bottom:12px">Lançar novo pagamento</h3>
      <div class="form-grid">
        <div class="field"><label>Valor (R$) *</label><input id="pp-valor" type="number" placeholder="150,00"/></div>
        <div class="field"><label>Data *</label><input id="pp-data" type="date" value="${new Date().toISOString().split('T')[0]}"/></div>
        <div class="field full"><label>Observação</label><input id="pp-obs" placeholder="Ex: 2ª parcela"/></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal('parc-modal')">Fechar</button>
        <button class="btn btn-primary" onclick="lancarParcela('${id}',${valorTotal})">Lançar Pagamento</button>
      </div>`:`
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal('parc-modal')">Fechar</button>
      </div>`}
    </div>
  </div>`);
}

async function lancarParcela(id, valorTotal){
  const valor = parseFloat(document.getElementById('pp-valor').value);
  const data  = document.getElementById('pp-data').value;
  const obs   = document.getElementById('pp-obs').value.trim();
  if(!valor||!data){ toast('Preencha valor e data','err'); return; }

  const insc = inscricoes.find(i=>i.id===id);
  const pagamentos = [...(insc.pagamentos||[]), {valor, data, obs}];
  const valorPago  = pagamentos.reduce((s,p)=>s+p.valor,0);
  const falta = Math.max(0, valorTotal - valorPago);
  const novoStatus = falta===0 ? 'pago_pix' : insc.status;

  await db.collection('inscricoes').doc(id).update({pagamentos, valorPago, status: novoStatus});
  toast(`Pagamento de ${fmtBRL(valor)} lançado!${falta===0?' Quitado! ✅':' Falta: '+fmtBRL(falta)}`);
  closeModal('parc-modal');
  setTimeout(()=>openParcelas(id), 300);
}

async function removerParcela(id, idx){
  if(!confirm('Remover este pagamento?')) return;
  const insc = inscricoes.find(i=>i.id===id);
  const pagamentos = (insc.pagamentos||[]).filter((_,i)=>i!==idx);
  const valorPago  = pagamentos.reduce((s,p)=>s+p.valor,0);
  await db.collection('inscricoes').doc(id).update({pagamentos, valorPago});
  toast('Pagamento removido');
  closeModal('parc-modal');
  setTimeout(()=>openParcelas(id), 300);
}

// ── EXPORTAR EXCEL ──
function exportarExcel(){
  const header = ['Nome','Email','Telefone','Instagram','Perfil','Faculdade','Forma Pagamento','Fidelidade','Valor Bruto','Valor Líquido (Cartão)','Valor Pago','Falta','Status','Parcelas Pagas'];
  const rows = inscricoes.map(i=>{
    const vTotal = i.valorFinal||0;
    const vPago  = i.valorPago||0;
    const vLiq   = i.valorLiquido!==undefined ? i.valorLiquido : '';
    const parcelas = (i.pagamentos||[]).map((p,idx)=>`P${idx+1}: R$${p.valor} em ${p.data}`).join(' | ');
    return [
      i.nome||'', i.email||'', i.telefone||'', i.instagram||'',
      i.perfil||'', i.faculdade||'', i.formaPagamento||'',
      i.fidelidade==='sim'?'Sim':'Não',
      vTotal.toFixed(2), vLiq!==''?parseFloat(vLiq).toFixed(2):'',
      vPago.toFixed(2), Math.max(0,vTotal-vPago).toFixed(2),
      statusLabel(i.status), parcelas
    ];
  });

  const csvContent = [header, ...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom+csvContent], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `inscricoes_${curso?.nome||'curso'}_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Excel gerado! Abra com Excel ou Google Sheets.');
}

async function updateStatus(id, status, sel){
  sel.className = `sts-sel sts-${status}`;
  const insc = inscricoes.find(i=>i.id===id);
  const updates = {status};
  if(status==='pago_pix'||status==='pago_cartao'){
    const isPix3x = (insc?.formaPagamento||'').includes('3x');
    if(!isPix3x){
      // PIX à vista ou cartão: marca valor total como pago
      updates.valorPago = insc?.valorFinal||0;
    }
    // PIX 3x: não sobrescreve, controlado pelas parcelas
  }
  if(status==='pgto_parcial'||status==='aguard_confirm'){
    // Não altera valorPago ao mudar status manualmente
  }
  await db.collection('inscricoes').doc(id).update(updates);
  toast('Status atualizado');
}

async function saveInsc(id){
  const nome = document.getElementById('if-nome').value.trim();
  if(!nome){ toast('Preencha o nome','err'); return; }
  const data = {
    nome, email:document.getElementById('if-email').value.trim(),
    telefone:document.getElementById('if-tel').value.trim(),
    instagram:document.getElementById('if-insta').value.trim(),
    perfil:document.getElementById('if-perfil').value,
    faculdade:document.getElementById('if-fac').value.trim(),
    formaPagamento:document.getElementById('if-pgto').value,
    fidelidade:document.getElementById('if-fid').value,
    valorFinal:parseFloat(document.getElementById('if-valor').value)||0,
    status:document.getElementById('if-status').value,
  };
  // Auto-set valorPago for PIX à vista and cartão when confirmed
  const isPix3x = data.formaPagamento.includes('3x');
  if((data.status==='pago_pix'||data.status==='pago_cartao') && !isPix3x){
    data.valorPago = data.valorFinal;
  }
  try {
    if(id){ await db.collection('inscricoes').doc(id).update(data); toast('Atualizado!'); }
    else { await db.collection('inscricoes').add({...data, criadoEm:firebase.firestore.FieldValue.serverTimestamp()}); toast('Adicionado!'); }
  } catch(e){ toast('Erro ao salvar','err'); }
  closeModal('insc-modal');
}

    vagas:parseInt(document.getElementById('cf-vagas').value)||0,
    descricao:document.getElementById('cf-desc').value.trim(),
    chavePix:document.getElementById('cf-pix').value.trim(),
    nomePix:document.getElementById('cf-pixnome').value.trim(),
    vAvista:parseFloat(document.getElementById('cf-v-avista').value)||0,
    vPix3x:parseFloat(document.getElementById('cf-v-pix3x').value)||0,
    pixP1:parseFloat(document.getElementById('cf-pix-p1').value)||0,
    pixP2:parseFloat(document.getElementById('cf-pix-p2').value)||0,
    pixP3:parseFloat(document.getElementById('cf-pix-p3').value)||0,
    vCartao:parseFloat(document.getElementById('cf-v-cartao').value)||0,
    linkCartao:document.getElementById('cf-link-cartao').value.trim(),
    fAvista:parseFloat(document.getElementById('cf-f-avista').value)||0,
    fPix3x:parseFloat(document.getElementById('cf-f-pix3x').value)||0,
    fCartao:parseFloat(document.getElementById('cf-f-cartao').value)||0,

function showPublicPage(){
  hide('loading-screen'); hide('app'); hide('login-page'); show('public-page');
  db.collection('config').doc('curso').get().then(snap=>{
    pubCurso = snap.exists ? snap.data() : null;
    renderPublicForm();
  });
}

function getValor(){
  const c = pubCurso||{};
  const fid = pubFidelidade==='sim';
  if(pubPgto==='avista') return parseFloat(fid?c.fAvista:c.vAvista)||0;
  if(pubPgto==='pix3x')  return parseFloat(fid?c.fPix3x:c.vPix3x)||0;
  if(pubPgto==='cartao') return parseFloat(fid?c.fCartao:c.vCartao)||0;
  return 0;
}

function selectPgtoPub(el, val){
  pubPgto = val;
  document.querySelectorAll('#radio-pgto .radio-opt').forEach(r=>r.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('bloco-pix3x').style.display = val==='pix3x'?'block':'none';
  document.getElementById('valor-preview').innerHTML = `💰 Valor: ${fmtBRL(getValor())}`;
}

function selectFid(el, val){
  pubFidelidade = val;
  document.querySelectorAll('#radio-fid .radio-opt').forEach(r=>r.classList.remove('selected'));
  el.classList.add('selected');
  const aviso = document.getElementById('fid-aviso');
  if(aviso) aviso.style.display = val==='sim'?'block':'none';
  document.getElementById('valor-preview').innerHTML = `💰 Valor: ${fmtBRL(getValor())}`;
}

async function submitInscricao(){
  const nome  = document.getElementById('pf-nome').value.trim();
  const email = document.getElementById('pf-email').value.trim();
  const tel   = document.getElementById('pf-tel').value.trim();
  if(!nome||!email||!tel){ toast('Preencha nome, email e telefone','err'); return; }
  if(!/\S+@\S+\.\S+/.test(email)){ toast('Email inválido','err'); return; }
  if(pubPgto==='pix3x'&&!pubAceitePix){ toast('Aceite as regras do parcelamento no PIX','err'); return; }
  if(!pubAceiteCancel){ toast('Aceite a política de cancelamento','err'); return; }

  const btn = document.getElementById('pub-submit-btn');
  btn.textContent='Enviando...'; btn.disabled=true;

  const pgtoLabel = {avista:'PIX à vista',pix3x:'3x no PIX',cartao:'Cartão (até 10x)'}[pubPgto];
  const valorFinal = getValor();

  try{
    const ref = await db.collection('inscricoes').add({
      nome, email, telefone:tel,
      instagram:document.getElementById('pf-insta').value.trim(),
      perfil:document.getElementById('pf-perfil').value,
      faculdade:document.getElementById('pf-fac').value.trim(),
      formaPagamento:pgtoLabel,
      fidelidade:pubFidelidade,
      valorFinal,
      status:'pendente',
      criadoEm:firebase.firestore.FieldValue.serverTimestamp()
    });
    pubInscId = ref.id;
    pubNome = nome;

    // Notificação no app
    await db.collection('notificacoes').add({
      tipo:'nova',
      nomeAluno:nome,
      detalhe:`${pgtoLabel} · ${fmtBRL(valorFinal)}${pubFidelidade==='sim'?' · 🤝 Fidelidade':''}`,
      inscricaoId:ref.id,
      lida:false,
      criadoEm:firebase.firestore.FieldValue.serverTimestamp()
    });

    // Email
    sendEmail(EJ_TMPL_INSC, {
      nome_aluno:nome, email_aluno:email, telefone:tel,
      forma_pagamento:pgtoLabel, fidelidade:pubFidelidade==='sim'?'Sim - aguarda verificação':'Não',
      valor:fmtBRL(valorFinal)
    });

    renderPublicPagamento();
  } catch(e){
    console.error(e);
    toast('Erro ao enviar. Tente novamente.','err');
    btn.textContent='Confirmar Inscrição'; btn.disabled=false;
  }
}

  show('public-page');
  db.collection('inscricoes').doc(inscId).get().then(snap=>{
    if(!snap.exists){ document.getElementById('public-page').innerHTML='<div style="padding:40px;text-align:center;color:var(--text2)">Inscrição não encontrada.</div>'; return; }
    renderAvisarForm(inscId, snap.data());
  });
}

function showAvisarPage(){
  hide('loading-screen'); hide('app'); hide('login-page'); show('public-page');
  const inscId = (hashNow||window.location.hash).replace('#/avisar/','');
  if(!inscId){ document.getElementById('public-page').innerHTML='<div style="padding:40px;text-align:center;color:var(--text2)">Link inválido.</div>'; return; }

  db.collection('inscricoes').doc(inscId).get().then(snap=>{
    if(!snap.exists){ document.getElementById('public-page').innerHTML='<div style="padding:40px;text-align:center;color:var(--text2)">Inscrição não encontrada.</div>'; return; }
    const insc = snap.data();
    renderAvisarForm(inscId, insc);
  });
}

function renderAvisarForm(inscId, insc){
  if(insc.status==='pago_pix'||insc.status==='pago_cartao'){
    document.getElementById('public-page').innerHTML = `
    <div class="confirm-card fade-in">
      <div class="confirm-ico">✅</div>
      <h1>Pagamento já confirmado!</h1>
      <p class="sub">Olá, <strong>${insc.nome}</strong>! Seu pagamento já foi confirmado. Sua vaga está garantida!</p>
      <div style="margin-top:16px;padding:14px;background:rgba(249,115,22,.06);border:1px solid rgba(249,115,22,.2);border-radius:10px;font-size:13px;color:var(--text2);text-align:center">
        Dúvidas? <a href="https://instagram.com/fccursos" target="_blank" style="color:var(--accent);font-weight:700">@fccursos</a>
      </div>
    </div>`; return;
  }

  document.getElementById('public-page').innerHTML = `
  <div class="confirm-card fade-in">
    <div class="confirm-ico">💰</div>
    <h1>Aviso de Pagamento</h1>
    <p class="sub">Olá, <strong>${insc.nome}</strong>! Informe os dados do seu pagamento abaixo.</p>

    <div style="background:var(--bg3);border-radius:10px;padding:16px;margin:16px 0;text-align:left">
      <p style="font-size:13px;color:var(--text2)">Forma de pagamento: <strong style="color:var(--text)">${insc.formaPagamento}</strong></p>
      <p style="font-size:13px;color:var(--text2);margin-top:4px">Valor: <strong style="color:var(--text)">${fmtBRL(insc.valorFinal)}</strong></p>
    </div>

    <div class="form-grid" style="margin-top:16px;text-align:left">
      <div class="field full"><label>Observação (opcional)</label><textarea id="av-obs" placeholder="Ex: Paguei a 1ª parcela de R$150 hoje..." rows="3"></textarea></div>
    </div>

    <button class="btn btn-primary btn-full" id="av-btn" onclick="enviarAviso('${inscId}','${insc.nome}','${insc.formaPagamento}',${insc.valorFinal||0})">
      📤 Enviar aviso de pagamento
    </button>

    <p style="font-size:12px;color:var(--text2);margin-top:12px">Após o aviso, confirmaremos seu pagamento e sua vaga será garantida.</p>
  </div>`;
}

async function enviarAviso(inscId, nome, pgto, valor){
  const obs = document.getElementById('av-obs').value.trim();
  const btn = document.getElementById('av-btn');
  btn.textContent='Enviando...'; btn.disabled=true;

  try{
    // Atualiza status
    await db.collection('inscricoes').doc(inscId).update({status:'aguard_confirm'});

    // Notificação no app
    await db.collection('notificacoes').add({
      tipo:'pagamento',
      nomeAluno:nome,
      detalhe:`${pgto} · ${fmtBRL(valor)}${obs?' · Obs: '+obs:''}`,
      inscricaoId:inscId,
      lida:false,
      criadoEm:firebase.firestore.FieldValue.serverTimestamp()
    });

    // Email
    sendEmail(EJ_TMPL_PGTO, {
      nome_aluno:nome,
      forma_pagamento:pgto,
      valor:fmtBRL(valor),
      observacao:obs||'Nenhuma'
    });

    document.getElementById('public-page').innerHTML = `
    <div class="confirm-card fade-in">
      <div class="confirm-ico">🎉</div>
      <h1>Aviso enviado!</h1>
      <p class="sub">Obrigado, <strong>${nome}</strong>! Recebemos seu aviso de pagamento.</p>
      <p class="sub" style="margin-top:8px">Confirmaremos sua vaga em breve.</p>
      <div style="margin-top:20px;padding:14px;background:rgba(249,115,22,.06);border:1px solid rgba(249,115,22,.2);border-radius:10px;font-size:13px;color:var(--text2);text-align:center">
        Dúvidas? <a href="https://instagram.com/fccursos" target="_blank" style="color:var(--accent);font-weight:700">@fccursos</a>
      </div>
    </div>`;
    window.scrollTo(0,0);
  } catch(e){
    console.error(e);
    toast('Erro ao enviar. Tente novamente.','err');
    btn.textContent='📤 Enviar aviso de pagamento'; btn.disabled=false;
  }
}

// Register Service Worker
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('/sw.js').catch(e=>console.log('SW:', e));
  });
}

function closeModal(id){
  document.querySelectorAll('.overlay').forEach(o => o.remove());
}
function closeIfOverlay(e, id){
  if(e.target.classList.contains('overlay')) closeModal(id);
}
</script>
</body>
</html>
